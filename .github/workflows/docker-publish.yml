name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Trigger Render Deploy
        run: |
          echo "🚀 Triggering Render deployment..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")

          if [ "$response" = "200" ] || [ "$response" = "201" ] || [ "$response" = "202" ]; then
            echo "✅ Deploy triggered successfully! (HTTP $response)"
            echo "Your app will be live at your Render URL in ~2-3 minutes."
          else
            echo "❌ Deploy trigger failed (HTTP $response)"
            exit 1
          fi
