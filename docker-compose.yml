# docker-compose.yml — for manual / local deployment
# Usage:
#   docker compose up -d        → start in background
#   docker compose logs -f      → follow logs
#   docker compose down         → stop and remove
#   docker compose pull && docker compose up -d  → update to latest

services:
  autogg:
    image: ghcr.io/vinhdinh2007-rgb/auto-google-form:latest
    container_name: autogg
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - AUTOGG_HOST=0.0.0.0
      - AUTOGG_PORT=5000
      - AUTOGG_HEADLESS=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
